<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Camera Monitor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #frame {
      width: 100vw;
      height: 100vh;
      object-fit: contain;
      display: block;
    }

    #overlay {
      position: fixed;
      top: 1rem;
      left: 1rem;
      color: #fff;
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      text-shadow: 0 1px 6px rgba(0, 0, 0, 0.9);
      pointer-events: none;
      user-select: none;
    }

    #error-overlay {
      display: none;
      position: fixed;
      inset: 0;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.75);
      color: #ff5555;
      font-size: 1.1rem;
      text-align: center;
      padding: 2rem;
    }

    #error-overlay.visible {
      display: flex;
    }
  </style>
</head>
<body>
  <img id="frame" alt="" />
  <div id="overlay"><span id="camera-name"></span></div>
  <div id="error-overlay" role="alert"><span id="error-msg"></span></div>

  <script>
    const frameEl    = document.getElementById('frame');
    const nameEl     = document.getElementById('camera-name');
    const errorEl    = document.getElementById('error-overlay');
    const errorMsgEl = document.getElementById('error-msg');

    let cameras = [];
    let rotationInterval = 10;
    let currentIndex = 0;

    function showError(msg) {
      errorMsgEl.textContent = msg;
      errorEl.classList.add('visible');
      frameEl.style.visibility = 'hidden';
    }

    function hideError() {
      errorEl.classList.remove('visible');
      frameEl.style.visibility = 'visible';
    }

    function showCamera(index, skipped = 0) {
      if (skipped >= cameras.length) {
        showError('No cameras are currently available.');
        return;
      }

      currentIndex = index;
      const camera = cameras[index];

      const loader = new Image();
      loader.onload = () => {
        frameEl.src = loader.src;
        nameEl.textContent = camera.name;
        hideError();
      };
      loader.onerror = () => {
        showCamera((index + 1) % cameras.length, skipped + 1);
      };
      loader.src = `/api/frame/${index}?_=${Date.now()}`;

      // Pre-fetch next camera
      const nextIndex = (index + 1) % cameras.length;
      const prefetch = new Image();
      prefetch.src = `/api/frame/${nextIndex}?_prefetch=1&_=${Date.now()}`;
    }

    async function init() {
      let config;
      try {
        const resp = await fetch('/api/config');
        if (!resp.ok) throw new Error('config request failed');
        config = await resp.json();
      } catch {
        showError('Failed to load camera configuration.');
        return;
      }

      cameras = config.cameras;
      rotationInterval = config.rotation_interval;

      if (!cameras.length) {
        showError('No cameras are configured.');
        return;
      }

      showCamera(0);
      setInterval(() => showCamera((currentIndex + 1) % cameras.length), rotationInterval * 1000);
    }

    init();
  </script>
</body>
</html>
